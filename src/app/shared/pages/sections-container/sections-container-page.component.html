<div class="container">
  <div class="mb-4">
    <div class="font-mono text-sm text-muted mb-1">FLEET OPS — FRONTEND DESIGN BRIEF</div>
    <h1 class="mb-1">Edge Device Management Platform</h1>
  </div>

  <div class="flex gap-2 tab-container mb-2">
    @for (s of SECTIONS(); track s.id) {
      <app-section-button
        [section]="s"
        [isActive]="activeRoute() === s.id"
        (selected)="handleSelectSection($event)">
      </app-section-button>
    }
  </div>

  <router-outlet></router-outlet>
</div>
