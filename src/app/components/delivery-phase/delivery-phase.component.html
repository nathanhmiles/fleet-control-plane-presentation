<div class="card p-4" [style.border-left]="'4px solid ' + phase().color">
  <div class="flex items-center gap-2 mb-2">
    <span class="font-mono text-sm" [style.color]="phase().color">{{ phase().phase }}</span>
    <span class="font-bold text-lg flex-1">{{ phase().title }}</span>
    <span class="text-sm text-muted">{{ phase().weeks }}</span>
  </div>
  <div class="box text-sm mb-2" [style.background]="phase().color + '1A'" [style.color]="phase().color">
    <em>{{ phase().why }}</em>
  </div>
  <ul class="no-bullets pl-0">
    @for (item of phase().items; track item; let j = $index) {
      <li class="flex gap-2 mb-1">
        <span class="font-mono text-sm" [style.color]="phase().color">{{ (j + 1).toString().padStart(2, '0') }}</span>
        <span>{{ item }}</span>
      </li>
    }
  </ul>
</div>
