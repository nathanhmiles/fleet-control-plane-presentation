<div class="card p-4 phase-accent">
  <div class="flex items-center gap-2 mb-2">
    <span class="font-mono text-sm phase-accent-text">Phase {{ phase().phase }}</span>
    <span class="font-bold text-lg flex-1">{{ phase().title }}</span>
    <span class="text-sm text-muted">{{ phase().weeks }}</span>
  </div>
  <div class="box text-sm mb-2 phase-accent-box">
    <em>{{ phase().why }}</em>
  </div>
  <ul class="no-bullets pl-0">
    @for (item of phase().items; track item; let j = $index) {
      <li class="flex gap-2 mb-1">
        <span class="font-mono text-sm phase-accent-text">{{ phase().phase}}{{ j + 1 }}</span>
        <span>{{ item }}</span>
      </li>
    }
  </ul>
</div>
