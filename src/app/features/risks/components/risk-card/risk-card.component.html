<div class="card p-3">
  <div class="flex items-center gap-2 mb-2">
    <small>Impact: </small><span class="badge severity-{{ risk().impact }}">{{ risk().impact | titlecase }}</span>
    <small>Likelihood: </small><span class="badge severity-{{ risk().likelihood }}">{{ risk().likelihood | titlecase }}</span>
    <span class="badge text-muted border-muted">{{ risk().category }}</span>
    <strong class="flex-1">{{ risk().risk }}</strong>
  </div>
  <p class="text-sm mb-2">{{ risk().detail }}</p>
  <div class="box muted-box text-sm flex gap-2">
    <span><strong>Mitigation:</strong> {{ risk().mitigation }}</span>
  </div>
</div>
